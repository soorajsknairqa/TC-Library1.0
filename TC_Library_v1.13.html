<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="TC Library - Linux & Windows Terminal Commands Reference">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TC Library 1.0">
  
  <title>TC Library 1.0</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap');

  :root {
    --term-bg: #0d1117;
    --term-surface: #161b22;
    --term-card: #1c2128;
    --term-border: #30363d;
    --term-green: #3fb950;
    --term-cyan: #79c0ff;
    --term-yellow: #e3b341;
    --term-purple: #d2a8ff;
    --term-red: #f85149;
    --term-orange: #ffa657;
    --term-text: #c9d1d9;
    --term-muted: #8b949e;
    --term-accent: #58a6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    touch-action: manipulation;
  }

  #root {
    font-family: 'Sora', sans-serif;
    background: var(--term-bg);
    color: var(--term-text);
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--term-border);
    padding: 12px 16px 10px;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .terminal-icon {
    width: 32px;
    height: 32px;
    background: var(--term-green);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #0d1117;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .header-sub {
    font-size: 10px;
    color: var(--term-muted);
    margin-top: 2px;
  }

  .count-badge {
    margin-left: auto;
    background: rgba(63,185,80,0.15);
    border: 1px solid rgba(63,185,80,0.3);
    color: var(--term-green);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: var(--term-surface);
    border: 1px solid var(--term-border);
    border-radius: 10px;
    padding: 0 12px;
    gap: 8px;
    transition: border-color 0.2s;
    min-height: 44px;
  }

  .search-bar:focus-within {
    border-color: var(--term-accent);
  }

  .search-icon {
    color: var(--term-muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--term-text);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    padding: 10px 0;
    -webkit-appearance: none;
  }

  .search-input::placeholder {
    color: var(--term-muted);
  }

  .categories {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 20px 0;
    scrollbar-width: none;
    background: var(--term-bg);
    flex-shrink: 0;
  }

  .categories::-webkit-scrollbar { display: none; }

  .tab-switcher {
    display: flex;
    gap: 8px;
    padding: 0 20px 10px;
    border-bottom: 1px solid var(--term-border);
    background: var(--term-bg);
    flex-shrink: 0;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    background: var(--term-card);
    border: 1px solid var(--term-border);
    border-radius: 8px;
    color: var(--term-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Sora', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab-btn:hover {
    background: var(--term-surface);
    color: var(--term-text);
  }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--term-green) 0%, var(--term-cyan) 100%);
    border-color: var(--term-green);
    color: #0d1117;
    font-weight: 700;
  }

  .tab-icon {
    font-size: 16px;
  }

  .categories {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 20px 0;
    scrollbar-width: none;
    background: var(--term-bg);
    flex-shrink: 0;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--term-border);
    background: none;
    color: var(--term-muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.3px;
  }

  .cat-btn:hover { background: var(--term-surface); color: var(--term-text); }

  .cat-btn.active {
    background: var(--term-surface);
    border-color: var(--cat-color, var(--term-accent));
    color: var(--cat-color, var(--term-accent));
  }

  .cat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .content {
    padding: 12px 16px 24px;
    overflow-y: auto;
    flex: 1;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--term-muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin: 16px 0 8px 2px;
  }

  .commands-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .cmd-card {
    background: var(--term-card);
    border: 1px solid var(--term-border);
    border-radius: 10px;
    padding: 11px 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .cmd-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--cat-color, var(--term-accent));
    opacity: 0;
    transition: opacity 0.15s;
  }

  .cmd-card:hover {
    border-color: var(--cat-color, var(--term-accent));
    background: var(--term-surface);
  }

  .cmd-card:hover::before { opacity: 1; }

  .cmd-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .cmd-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--term-text);
  }

  .cmd-badge {
    background: rgba(88,166,255,0.12);
    border: 1px solid rgba(88,166,255,0.25);
    color: var(--term-accent);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }

  .cmd-desc {
    font-size: 12px;
    color: var(--term-muted);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .cmd-syntax {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--term-green);
    background: rgba(63,185,80,0.08);
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid rgba(63,185,80,0.15);
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--term-muted);
    font-size: 13px;
  }

  .no-results-icon {
    display: block;
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--term-surface);
    border: 1px solid var(--term-border);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--term-border);
    position: sticky;
    top: 0;
    background: var(--term-surface);
    z-index: 10;
  }

  .modal-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .modal-cmd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
  }

  .modal-cat {
    font-size: 11px;
    color: var(--term-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .modal-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--term-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
    line-height: 1;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--term-text); }

  .modal-body {
    padding: 20px;
  }

  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--term-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 16px 0 8px;
  }

  .modal-section-title:first-child { margin-top: 0; }

  .modal-desc {
    font-size: 13px;
    line-height: 1.6;
    color: var(--term-text);
  }

  .modal-syntax-block {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--term-card);
    border: 1px solid var(--term-border);
    padding: 10px 12px;
    border-radius: 8px;
    color: var(--term-green);
  }

  .option-row {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--term-border);
  }

  .option-row:last-child { border-bottom: none; }

  .option-flag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--term-cyan);
    min-width: 100px;
    flex-shrink: 0;
  }

  .option-desc {
    font-size: 12px;
    color: var(--term-muted);
    line-height: 1.5;
  }

  .example-block {
    margin: 10px 0;
    border: 1px solid var(--term-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .example-topbar {
    background: var(--term-card);
    padding: 6px 12px;
    font-size: 10px;
    color: var(--term-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .example-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 12px;
    background: #0a0e14;
    line-height: 1.6;
    overflow-x: auto;
  }

  .ex-prompt { color: var(--term-green); }
  .ex-cmd { color: var(--term-cyan); }
  .ex-arg { color: var(--term-yellow); }
  .ex-flag { color: var(--term-purple); }
  .ex-out { color: var(--term-muted); }

  .copy-btn {
    background: var(--term-card);
    border: 1px solid var(--term-border);
    color: var(--term-accent);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin: 8px 0;
    font-family: 'Sora', sans-serif;
  }

  .copy-btn:hover {
    background: var(--term-surface);
    border-color: var(--term-accent);
  }

  .related-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    background: var(--term-card);
    border: 1px solid var(--term-border);
    color: var(--term-text);
    padding: 5px 10px;
    border-radius: 16px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag:hover {
    border-color: var(--term-accent);
    color: var(--term-accent);
  }

  /* Install prompt */
  .install-prompt {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--term-surface);
    border: 1px solid var(--term-border);
    border-radius: 12px;
    padding: 12px 16px;
    display: none;
    align-items: center;
    gap: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 2000;
    max-width: 90%;
  }

  .install-prompt.show {
    display: flex;
  }

  .install-prompt-text {
    font-size: 12px;
    color: var(--term-text);
  }

  .install-prompt-btn {
    background: var(--term-green);
    color: #0d1117;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }

  .install-prompt-close {
    background: none;
    border: none;
    color: var(--term-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }

  /* Mobile Optimizations */
  @media (max-width: 768px) {
    .header {
      padding: 10px 14px 8px;
    }

    .content {
      padding: 12px 14px 80px 14px;
    }
    
    .cmd-card {
      padding: 14px;
      min-height: 44px;
    }
    
    .cmd-name {
      font-size: 14px;
    }
    
    .cmd-desc {
      font-size: 13px;
      line-height: 1.5;
    }
    
    .modal-box {
      max-width: 95%;
      margin: 10px;
      max-height: 85vh;
    }

    .modal-header {
      padding: 14px 16px;
    }

    .modal-body {
      padding: 16px;
    }

    .example-code {
      font-size: 10px;
    }

    .tab-switcher, .categories {
      padding-left: 14px;
      padding-right: 14px;
    }
  }

  /* Touch optimizations for all devices */
  .tab-btn, .cat-btn, .cmd-card, .copy-btn, .tag {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  .tab-btn:active {
    transform: scale(0.98);
  }

  .cat-btn:active {
    transform: scale(0.95);
  }

  .cmd-card:active {
    border-color: var(--cat-color, var(--term-accent));
    background: var(--term-surface);
    transform: scale(0.98);
  }

  .cmd-card:active::before {
    opacity: 1;
  }

  .copy-btn:active {
    transform: scale(0.95);
  }

  /* Smooth scrolling */
  .content, .categories {
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  .modal-box {
    -webkit-overflow-scrolling: touch;
  }

  /* iOS safe area support */
  @supports (padding: max(0px)) {
    .header {
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-top: max(10px, env(safe-area-inset-top));
    }
    
    .content {
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-bottom: max(80px, env(safe-area-inset-bottom));
    }

    .tab-switcher, .categories {
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
    }
  }

  /* Prevent text selection on UI elements */
  .tab-btn, .cat-btn, .cmd-badge, .count-badge {
    -webkit-user-select: none;
    user-select: none;
  }

  /* Better focus states for accessibility */
  .search-input:focus {
    outline: none;
  }

  /* Optimize font rendering on mobile */
  @media (max-width: 768px) {
    body {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
  }
</style>
</head>
<body>
  <div id="root">
    <div class="header">
      <div class="header-top">
        <div class="terminal-icon">$_</div>
        <div>
          <div class="header-title">TC Library 1.0</div>
          <div class="header-sub">Terminal Commands Reference</div>
        </div>
        <div class="count-badge"><span id="result-count">0</span> cmds</div>
      </div>
      <div style="text-align: left; padding: 0 0 8px 0; font-size: 9px; color: var(--term-muted); letter-spacing: 0.3px;">
        Credits: <strong style="color: var(--term-green);">SSK-BLUM</strong>
      </div>
      <div class="search-bar">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" class="search-input" placeholder="Search commands, descriptions, tags...">
      </div>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" id="linux-tab" onclick="switchTab('linux')">
        <span class="tab-icon">🐧</span>
        Linux
      </button>
      <button class="tab-btn" id="windows-tab" onclick="switchTab('windows')">
        <span class="tab-icon">🪟</span>
        Windows
      </button>
      <button class="tab-btn" id="adb-tab" onclick="switchTab('adb')">
        <span class="tab-icon">🤖</span>
        ADB
      </button>
    </div>

    <div class="categories" id="categories"></div>

    <div class="content" id="content"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <div class="install-prompt" id="install-prompt">
    <span class="install-prompt-text">Install app for offline access</span>
    <button class="install-prompt-btn" id="install-btn">Install</button>
    <button class="install-prompt-close" id="install-close">✕</button>
  </div>

<script>
// Service Worker Registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker registered'))
      .catch(err => console.log('Service Worker registration failed:', err));
  });
}

// Install prompt
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-prompt').classList.add('show');
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-prompt').classList.remove('show');
  }
});

document.getElementById('install-close').addEventListener('click', () => {
  document.getElementById('install-prompt').classList.remove('show');
});

// Command data
const WIN_CATS = [
  { id:'all',    label:'All',          color:'#60A5FA' },
  { id:'run',    label:'Run Commands', color:'#818CF8' },
  { id:'cmd',    label:'CMD',          color:'#34D399' },
  { id:'ps',     label:'PowerShell',   color:'#3B82F6' },
  { id:'admin',  label:'Admin Tools',  color:'#8B5CF6' },
  { id:'diag',   label:'Diagnostics',  color:'#F87171' },
  { id:'file',   label:'Files',        color:'#10B981' },
  { id:'sec',    label:'Security',     color:'#FBBF24' },
  { id:'app',    label:'Apps',         color:'#A78BFA' },
  { id:'set',    label:'Settings',     color:'#60A5FA' },
  { id:'net',    label:'Network',      color:'#14B8A6' },
  { id:'disp',   label:'Display',      color:'#F59E0B' },
  { id:'access', label:'Accessibility',color:'#EC4899' },
  { id:'power',  label:'Power',        color:'#06B6D4' },
  { id:'winget', label:'Winget',       color:'#38bdf8' }
];

const WIN_COMMANDS = [
  // CMD Commands
  {cmd:"dir",desc:"List directory contents with files and folders.",cat:"cmd",
    syntax:"cmd → dir [path] [options]",
    options:[{f:"/w",d:"Wide list format"},{f:"/p",d:"Pause after each screen"},{f:"/s",d:"Include subdirectories"},{f:"/a",d:"Show hidden files"},{f:"/o:n",d:"Sort by name"},{f:"/o:d",d:"Sort by date"}],
    examples:[{title:"List files",code:`<span class="ex-prompt">cmd</span> →\n<span class="ex-cmd">dir</span>\n<span class="ex-cmd">dir</span> <span class="ex-flag">/w</span>  <span class="ex-out"># wide format</span>\n<span class="ex-cmd">dir</span> <span class="ex-flag">/s</span> <span class="ex-arg">*.txt</span>  <span class="ex-out"># all txt files</span>`}]},
  {cmd:"cd",desc:"Change current directory.",cat:"cmd",

let activeCategory = 'all';
let searchQuery = '';
let currentCmd = null;
let activeTab = 'linux'; // 'linux', 'windows', or 'adb'

function getCurrentCommands() {
  if (activeTab === 'linux') return COMMANDS;
  if (activeTab === 'windows') return WIN_COMMANDS;
  return ADB_COMMANDS;
}

function getCurrentCategories() {
  if (activeTab === 'linux') return CATS;
  if (activeTab === 'windows') return WIN_CATS;
  return ADB_CATS;
}

function switchTab(tab) {
  activeTab = tab;
  activeCategory = 'all';
  searchQuery = '';
  document.getElementById('search').value = '';
  
  // Update tab buttons
  document.getElementById('linux-tab').classList.toggle('active', tab === 'linux');
  document.getElementById('windows-tab').classList.toggle('active', tab === 'windows');
  document.getElementById('adb-tab').classList.toggle('active', tab === 'adb');
  
  renderCategories();
  renderContent();
}

function catColor(id) {
  const cats = getCurrentCategories();
  return (cats.find(c => c.id === id) || {}).color || '#58a6ff';
}

function renderCategories() {
  const el = document.getElementById('categories');
  const cats = getCurrentCategories();
  el.innerHTML = cats.map(c => `
    <button class="cat-btn ${activeCategory === c.id ? 'active' : ''}"
      style="--cat-color: ${c.color}"
      onclick="setCategory('${c.id}')">
      <span class="cat-dot"></span>${c.label}
    </button>`).join('');
}

function getFiltered() {
  const commands = getCurrentCommands();
  return commands.filter(cmd => {
    const matchCat = activeCategory === 'all' || cmd.cat === activeCategory;
    const q = searchQuery.toLowerCase();
    const cmdName = (cmd.name || cmd.cmd || '').toLowerCase();
    const matchSearch = !q || cmdName.includes(q) || cmd.desc.toLowerCase().includes(q)
      || (cmd.tags || []).some(t => t.includes(q));
    return matchCat && matchSearch;
  });
}

function renderContent() {
  const filtered = getFiltered();
  const el = document.getElementById('content');
  const cats = getCurrentCategories();
  document.getElementById('result-count').textContent = filtered.length;

  if (!filtered.length) {
    el.innerHTML = `<div class="no-results">
      <span class="no-results-icon">¬</span>
      <div>No commands found for "<strong style="color:var(--term-text)">${searchQuery}</strong>"</div>
      <div style="margin-top:6px;font-size:12px">Try a different search term</div>
    </div>`;
    return;
  }

  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.cat]) groups[c.cat] = [];
    groups[c.cat].push(c);
  });

  let html = '';
  if (activeCategory === 'all') {
    Object.keys(groups).forEach(cat => {
      const catObj = cats.find(c => c.id === cat);
      html += `<div class="section-label">${catObj ? catObj.label : cat} <span style="opacity:.5">(${groups[cat].length})</span></div>`;
      html += '<div class="commands-grid">' + groups[cat].map(cmd => renderCard(cmd)).join('') + '</div>';
    });
  } else {
    html = '<div class="commands-grid">' + filtered.map(cmd => renderCard(cmd)).join('') + '</div>';
  }
  el.innerHTML = html;
}

function renderCard(cmd) {
  const color = catColor(cmd.cat);
  const cats = getCurrentCategories();
  const cmdIdentifier = cmd.name || cmd.cmd; // Use name for Linux, cmd for Windows
  const cmdDisplay = cmd.name || cmd.cmd;
  const cmdSyntax = cmd.syntax || cmd.cmd;
  
  return `<div class="cmd-card" style="--cat-color:${color}" onclick="openModal('${cmdIdentifier}')">
    <div class="cmd-top">
      <span class="cmd-name">${cmdDisplay}</span>
      <span class="cmd-badge">${(cats.find(c=>c.id===cmd.cat)||{}).label||cmd.cat}</span>
    </div>
    <div class="cmd-desc">${cmd.desc.split('—')[0].trim()}</div>
    <div class="cmd-syntax">${cmdSyntax}</div>
  </div>`;
}

function openModal(name) {
  const commands = getCurrentCommands();
  const cats = getCurrentCategories();
  const cmd = commands.find(c => c.name === name || c.cmd === name);
  if (!cmd) return;
  currentCmd = cmd;
  const color = catColor(cmd.cat);
  const catLabel = (cats.find(c=>c.id===cmd.cat)||{}).label||cmd.cat;

  // For Windows or ADB commands
  if (activeTab === 'windows' || activeTab === 'adb') {
    const tabLabel = activeTab === 'adb' ? 'ADB' : 'Windows';
    let optHtml = '';
    if (cmd.options && cmd.options.length) {
      optHtml = `<div class="modal-section-title">Options & Notes</div>
        <div>${cmd.options.map(o => `
          <div class="option-row">
            <span class="option-flag">${o.f}</span>
            <span class="option-desc">${o.d}</span>
          </div>`).join('')}</div>`;
    }

    let exHtml = '';
    if (cmd.examples && cmd.examples.length) {
      exHtml = `<div class="modal-section-title">Examples</div>` +
        cmd.examples.map(ex => `
          <div class="example-block">
            <div class="example-topbar">${tabLabel} — ${ex.title}</div>
            <div class="example-code">${ex.code}</div>
          </div>
          <button class="copy-btn" onclick="copyWinCommand('${cmd.cmd.replace(/'/g, "\\'")}')">Copy command</button>
        `).join('');
    }

    let tagsHtml = '';
    if (cmd.tags && cmd.tags.length) {
      const commands = getCurrentCommands();
      tagsHtml = `<div class="modal-section-title">Related commands</div>
        <div class="related-tags">${cmd.tags.map(t => {
          const found = commands.find(c=>c.name===t||c.cmd===t);
          return `<span class="tag" onclick="${found?`openModal('${t}')`:`void(0)`}">${t}</span>`;
        }).join('')}</div>`;
    }

    document.getElementById('modal-box').innerHTML = `
    <div class="modal-header">
      <div class="modal-icon" style="background:${color}20; color:${color}; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px">${(cmd.cmd || cmd.name).slice(0,4)}</div>
      <div>
        <div class="modal-cmd" style="color:${color}">${cmd.cmd}</div>
        <div class="modal-cat">${catLabel}</div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-title">Description</div>
      <div class="modal-desc">${cmd.desc}</div>
      ${cmd.syntax ? `<div class="modal-section-title" style="margin-top:14px">Syntax</div>
      <div class="modal-syntax-block">${cmd.syntax}</div>` : ''}
      ${optHtml}${exHtml}${tagsHtml}
    </div>`;
    document.getElementById('modal-overlay').classList.add('open');
    return;
  }

  // For Linux commands (full details)
  let optHtml = '';
  if (cmd.options && cmd.options.length) {
    optHtml = `<div class="modal-section-title">Options & flags</div>
      <div>${cmd.options.map(o => `
        <div class="option-row">
          <span class="option-flag">${o.f}</span>
          <span class="option-desc">${o.d}</span>
        </div>`).join('')}</div>`;
  }

  let exHtml = '';
  if (cmd.examples && cmd.examples.length) {
    exHtml = `<div class="modal-section-title">Examples</div>` +
      cmd.examples.map(ex => `
        <div class="example-block">
          <div class="example-topbar">bash — ${ex.title}</div>
          <div class="example-code">${ex.code}</div>
        </div>
        <button class="copy-btn" onclick="copySyntax('${cmd.name}')">Copy syntax</button>
      `).join('');
  }

  let tagsHtml = '';
  if (cmd.tags && cmd.tags.length) {
    tagsHtml = `<div class="modal-section-title">Related commands</div>
      <div class="related-tags">${cmd.tags.map(t => {
        const found = commands.find(c=>c.name===t);
        return `<span class="tag" onclick="${found?`openModal('${t}')`:`void(0)`}">${t}</span>`;
      }).join('')}</div>`;
  }

  document.getElementById('modal-box').innerHTML = `
    <div class="modal-header">
      <div class="modal-icon" style="background:${color}20; color:${color}; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px">${cmd.name.slice(0,4)}</div>
      <div>
        <div class="modal-cmd" style="color:${color}">${cmd.name}</div>
        <div class="modal-cat">${catLabel}</div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-title">Description</div>
      <div class="modal-desc">${cmd.desc}</div>
      <div class="modal-section-title" style="margin-top:14px">Syntax</div>
      <div class="modal-syntax-block">${cmd.syntax}</div>
      ${optHtml}${exHtml}${tagsHtml}
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'modal-overlay') closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function copySyntax(name) {
  const commands = getCurrentCommands();
  const cmd = commands.find(c=>c.name===name || c.cmd===name);
  if (cmd && navigator.clipboard) {
    navigator.clipboard.writeText(cmd.syntax || cmd.cmd);
  }
}

function copyWinCommand(cmd) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(cmd);
  }
}

function setCategory(id) {
  activeCategory = id;
  renderCategories();
  renderContent();
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (searchQuery) activeCategory = 'all';
  renderCategories();
  renderContent();
});

renderCategories();
renderContent();
</script>
</body>
</html>
